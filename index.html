<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John & Jane Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="curtain-stage">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="stage-content">
<div class="container">
    <canvas id="particles-canvas"></canvas>
    <div id="hearts-float"></div>
    <div id="rose-petals"></div>
        <header class="hero">
            <h1 class="couple-name">John & Jane</h1>
<p class="tagline"><span id="typewriter"></span></p>
            <div id="countdown" class="countdown"></div>
            <p class="date">December 31, 2026</p>
        </header>

        <section class="venue">
            <h2>📍 Venue Details</h2>
            <div class="venue-info">
                <p><strong>Grand Palace Hotel</strong><br>
                123 Wedding Street, Romantic City<br>
                Ceremony: 4:00 PM | Reception: 6:00 PM</p>
                <div class="map-placeholder">
                    <!-- Placeholder for Google Maps embed -->
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.566745964308!2d-73.987319684593!3d40.748447979328!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDQ0JzU0LjQiTiA3M8KwNTknMTYuNSJX!5e0!3m2!1sen!2sus!4v1690000000000" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <section class="rsvp">
            <h2>💌 RSVP</h2>
            <p>Will you join our special day?</p>
            <button class="rsvp-btn" onclick="rsvp()">Yes, I'll be there! 🎉</button>
            <button class="rsvp-btn no" onclick="rsvpNo()">Sorry, can't make it 😔</button>
        </section>

        <footer>
            <p>With love, John & Jane 💕</p>
        </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
